<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 310" width="680" height="310">
  <defs>
    <style>
      .t { font-family: ui-monospace, 'Cascadia Code', 'Courier New', monospace; font-size: 13px; }
      @keyframes a  { from { opacity: 0 } to { opacity: 1 } }
      @keyframes bl { 0%,49%{ opacity:1 } 50%,100%{ opacity:0 } }
      .l1  { animation: a .15s  .5s forwards; opacity:0 }
      .l2  { animation: a .15s 1.4s forwards; opacity:0 }
      .l3  { animation: a .15s 2.2s forwards; opacity:0 }
      .l4  { animation: a .15s 3.0s forwards; opacity:0 }
      .l5  { animation: a .15s 3.8s forwards; opacity:0 }
      .l6  { animation: a .15s 4.6s forwards; opacity:0 }
      .l7  { animation: a .15s 5.0s forwards; opacity:0 }
      .l8  { animation: a .15s 5.4s forwards; opacity:0 }
      .l9  { animation: a .15s 5.8s forwards; opacity:0 }
      .l10 { animation: a .15s 6.4s forwards; opacity:0 }
      .l11 { animation: a .15s 7.0s forwards; opacity:0 }
      .cur { animation: a .15s 7.0s forwards, bl 1.1s 7.2s infinite; opacity:0 }
    </style>
  </defs>

  <!-- Terminal window -->
  <rect width="680" height="310" rx="10" fill="#0d1117"/>

  <!-- Title bar -->
  <rect width="680" height="34" rx="10" fill="#161b22"/>
  <rect y="27" width="680" height="7" fill="#161b22"/>

  <!-- Traffic lights -->
  <circle cx="18" cy="17" r="5.5" fill="#ff5f57"/>
  <circle cx="36" cy="17" r="5.5" fill="#febc2e"/>
  <circle cx="54" cy="17" r="5.5" fill="#28c840"/>

  <!-- Window title -->
  <text x="340" y="21" text-anchor="middle" font-family="monospace" font-size="11" fill="#8b949e">polymath-world</text>

  <!-- L1: command (0.5s) -->
  <text class="t l1" x="20" y="58">
    <tspan fill="#58a6ff">&#x276F; </tspan><tspan fill="#e6edf3">npx polymath-world</tspan>
  </text>

  <!-- L2: logo (1.4s) -->
  <text class="t l2" x="20" y="82">
    <tspan fill="#f0f6fc" font-size="14" font-weight="bold">Polymath World</tspan>
    <tspan fill="#6e7681" font-size="12">  v0.1.2  &#x2014;  PARA + LLM Wiki + Caveman</tspan>
  </text>

  <!-- L3: Q1 vault name (2.2s) -->
  <text class="t l3" x="20" y="110">
    <tspan fill="#e3b341">? </tspan>
    <tspan fill="#e6edf3">Vault name </tspan>
    <tspan fill="#6e7681">&#x203A; </tspan>
    <tspan fill="#79c0ff">my-second-brain</tspan>
  </text>

  <!-- L4: Q2 areas (3.0s) -->
  <text class="t l4" x="20" y="126">
    <tspan fill="#e3b341">? </tspan>
    <tspan fill="#e6edf3">Areas to start </tspan>
    <tspan fill="#6e7681">&#x203A; </tspan>
    <tspan fill="#79c0ff">Learning, Health, Finance, Work</tspan>
  </text>

  <!-- L5: Q3 caveman (3.8s) -->
  <text class="t l5" x="20" y="142">
    <tspan fill="#e3b341">? </tspan>
    <tspan fill="#e6edf3">Install Caveman compression </tspan>
    <tspan fill="#6e7681">&#x203A; </tspan>
    <tspan fill="#79c0ff">Yes</tspan>
  </text>

  <!-- L6: check 1 (4.6s) -->
  <text class="t l6" x="20" y="170">
    <tspan fill="#3fb950">&#x2713; </tspan>
    <tspan fill="#8b949e">Creating PARA folder structure</tspan>
  </text>

  <!-- L7: check 2 (5.0s) -->
  <text class="t l7" x="20" y="186">
    <tspan fill="#3fb950">&#x2713; </tspan>
    <tspan fill="#8b949e">Writing CLAUDE.md schema</tspan>
  </text>

  <!-- L8: check 3 (5.4s) -->
  <text class="t l8" x="20" y="202">
    <tspan fill="#3fb950">&#x2713; </tspan>
    <tspan fill="#8b949e">Wiring Claude Code skill</tspan>
  </text>

  <!-- L9: done (5.8s) -->
  <text class="t l9" x="20" y="218">
    <tspan fill="#3fb950">&#x2713; </tspan>
    <tspan fill="#3fb950">Vault ready in 2.4s</tspan>
  </text>

  <!-- L10: instruction (6.4s) -->
  <text class="t l10" x="20" y="246" fill="#6e7681">
    Open my-second-brain in Obsidian &#x2192; File &#x203A; Open folder as vault
  </text>

  <!-- L11: new prompt (7.0s) -->
  <text class="t l11" x="20" y="274" fill="#58a6ff">&#x276F; </text>

  <!-- Blinking cursor (7.0s appear, 7.2s blink) -->
  <rect class="cur" x="36" y="262" width="7.5" height="14" fill="#58a6ff"/>
</svg>
